name: Periodic Health Check

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily
  workflow_dispatch:   # Allows you to click the 'Run' button manually

jobs:
  periodic_health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the deployed service URL
        uses: jasonetco/url-health-check@v1
        with:
          url: https://purushoa-pokedex.onrender.com/health
          max-attempts: 3
          retry-delay: 5s
